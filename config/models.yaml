profiles:
  - name: small
    description: "Laptops and machines with up to 32 GB RAM"
    max_ram_gb: 32
    text_model: qwen3:14b-q4_K_M
    vlm_model: qwen3-vl:8b-instruct-q4_K_M
    extraction_model: qwen3:4b
    embedding_model: qwen3-embedding:4b
    embedding_small_model: qwen3-embedding:0.6b
    reranker_model: dengcao/Qwen3-Reranker-4B:Q5_K_M
    required_models:
      - qwen3:14b-q4_K_M
      - qwen3-vl:8b-instruct-q4_K_M
      - qwen3:4b
      - qwen3-embedding:4b
      - qwen3-embedding:0.6b
      - dengcao/Qwen3-Reranker-4B:Q5_K_M
    warmup_models:
      - qwen3:14b-q4_K_M
      - qwen3-vl:8b-instruct-q4_K_M
    memory_hints:
      qwen3:14b-q4_K_M: 8
      qwen3-vl:8b-instruct-q4_K_M: 6
      qwen3:4b: 3
      qwen3-embedding:4b: 3
      qwen3-embedding:0.6b: 1
      dengcao/Qwen3-Reranker-4B:Q5_K_M: 3
    largest_model_gb: 8

  - name: large
    description: "Workstations with more than 32 GB RAM"
    min_ram_gb: 64
    text_model: qwen3:14b
    vlm_model: qwen3-vl:32b
    extraction_model: qwen3:8b
    embedding_model: qwen3-embedding:4b
    embedding_small_model: qwen3-embedding:0.6b
    reranker_model: dengcao/Qwen3-Reranker-4B:Q5_K_M
    required_models:
      - qwen3:14b
      - qwen3-vl:32b
      - qwen3:8b
      - qwen3-embedding:4b
      - qwen3-embedding:0.6b
      - dengcao/Qwen3-Reranker-4B:Q5_K_M
    warmup_models:
      - qwen3:14b
      - qwen3-vl:32b
    memory_hints:
      qwen3:14b: 14
      qwen3-vl:32b: 21
      qwen3:8b: 5
      qwen3-embedding:4b: 3
      qwen3-embedding:0.6b: 1
      dengcao/Qwen3-Reranker-4B:Q5_K_M: 3
    largest_model_gb: 21

defaults:
  inference_buffer_gb: 4
  service_overhead_gb: 2
